<!DOCTYPE html>
<html>
<head>
    <title>Available Jobs</title>
</head>
<body>

<h1>Available Jobs</h1>

{% for job in jobs %}
    <h2>{{ job.title }}</h2>
    <p>{{ job.description }}</p>
    <p><b>Location:</b> {{ job.location }}</p>
    <p><b>Company:</b> {{ job.company }}</p>
    <p><b>Salary:</b> {{ job.salary }}</p>
    <hr>
{% empty %}
    <p>No jobs available.</p>
{% endfor %}

</body>
</html>
